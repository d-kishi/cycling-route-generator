    self_assessment:
      coverage: medium
      confidence: medium
      notes: "インターバル要件・試走ニーズ具体的収集。テーパリング期は間接情報中心、日本語競技者コミュニティ収集不足"
  - category: "レース志向が既存ツールに感じる限界"
    summary: |
      【Stravaの限界】
      2020年5月ルートビルダー・セグメントリーダーボード有料化(月525-800円)。国内競技者反発顕著。
      CBN Blog調査: 継続課金予定25-30%、移行先Garmin/RWGPS同率1位。
      競技者核心不満「リーダーボード見られなくなるとモチベーションがなくなる」セグメント競争へのこだわり。
      ルート探索より「セグメントランキング喪失」が痛い。
      Strava公式コミュニティで「Strava Fitness vs TrainingPeaks Fitness/Fatigueの大きな乖離」疑問
      (アルゴリズム透明性不足)。
      BikeRadar「Strava route builder often falls short」業界評価。

      【Garmin Connectの限界】
      ルート同期制限: 走行中のコース変更・再作成・転送が不可能、ライド中の臨機応変対応不可。
      ナビ精度問題「警告が読みにくい・確認しようとすると消える」。
      リルート機能が逆に邪魔(意図的ルート逸脱を許容しない)。
      TrainingPeaksへの自動同期は評価高い。

      【TrainingPeaksのルート機能の現実】
      本来ルート探索・作成機能を持たない。2026年2月にGPXplore新機能追加(DCRainmaker)、
      それ以前は外部GPX→インポートの多ステップ必須。
      DCRainmaker「ワークフロー摩擦最小化の重要性」批判。
      トレーニング管理(TSS/CTL/ATL/PMC)特化と「どこを走るか」計画には不向きの構造的分離。
      有料版でないと詳細パワー/心拍分析不可。

      【ツール共通の構造的弱さ】
      Garmin/Strava/TrainingPeaksいずれも「走った後のログ解析」に優れるが
      「これから走る場所を探索・計画」する機能は設計の中心にない。
      競技者要件(信号密度・勾配分布・獲得標高制御・インターバル想定フラット区間)を
      パラメータとしてルート生成するツールは存在しない。
      RideWithGPSは代替評価だがTSS予測との統合は限定的。
    sources:
