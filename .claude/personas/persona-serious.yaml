    self_assessment:
      coverage: high
      confidence: high
      notes: "FTP・オーバートレーニング・引退理由3点とも具体的一次情報・実体験収集。年齢・仕事・家族の三重苦は個人ブログ中心で公式調査補強余地"
  - category: "レース志向のルート設計ニーズ"
    summary: |
      【インターバル練習ルート要件】
      日本語圏・英語圏とも「信号なし・交通量少・中断なし」が共通最重要要件。
      関東代表例: 尾根幹(町田〜稲城20km、適度なアップダウン+直線)、荒川CR(80km超、信号ほぼゼロ)、
      霞ヶ浦一周(125km、交通量少)。
      TrainerRoad/FasCat「工業団地夕方・週末」「アウトアンドバック区間往復」。
      「信号多→ブレーキ・加速・精神疲労の三重苦」競技者目線。

      【ヒルクライム試走ニーズ】
      富士ヒル試走実例(note.com/commutebymybike): 目的「高地デバフ体感とパワー計測」。
      平地260W→高地230W(約1割落ち)実測、「260W×0.9=234W」予測一致確認。
      試走なしではペース配分組めない、シリアス層の共通認識。
      区間ごと通過タイム目標をトップチューブに貼る実践行動。

      【テーパリング期練習ルート要件】
      テーパリング(レース3週前から負荷7→6→5割段階低下)は「短めショートインターバル軽刺激」ルート必要。
      長距離・高負荷不要、5-10分一定強度区間が短く繰り返せる構造が適切。
      「疲れを残さず体に刺激を与える」という矛盾要件、長さより強度制御可能なルートが求められる。

      【チーム練習固有要件】
      集団走行は幅ある道・見通し良好が安全上必須。
      直線区間がドラフティング・フォーメーション習得に必要。
      修善寺CSC・群馬CSC等のレース会場周回コース練習も定番。
      走り込み習熟度がレース成績に直結。
    sources:
