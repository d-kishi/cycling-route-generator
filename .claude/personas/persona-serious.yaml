id: persona-serious
name: シリアスロードライダー
description: ロード歴5年以上、月1000-1500km走るレース志向の競技層。データ駆動でトレーニング設計し、ハイエンド機材+電動コンポを複数所有。ホイール投資にも積極的で、ヒルクライム・クリテリウム・ロードレース等の成績向上を主目標とする
attributes:
  age_range: "20代-50代"
  experience_level: "ロード歴5年以上(学生時代からの競技経験者を含む)、ヒルクライム/クリテリウム/ロードレース等のレース参戦経験豊富"
  typical_scenario: "土日に150-300kmのレース練習・チーム練習。平日はインドアトレーニング(Zwift)とインターバルメニュー。レース本番に向けたピリオダイゼーション(テーパリング)を意識"
  monthly_distance: "1000-1500km/月(インドア比率が高い時期もあり)"
  motivation:
    - "FTP/PWR(パワーウェイトレシオ)の向上"
    - "ヒルクライム/クリテリウム/ロードレースでの好成績"
    - "レースカテゴリの昇格(クラス3→2→1等)"
    - "走力・データへの自己投資"
  bike_type: "ハイエンドロード2台以上の所有が前提(レース用エアロロード+ヒルクライム用軽量バイクの使い分けが標準)。完成車価格70-150万円/台、累計150-300万円超。Ultegra Di2/Dura-Ace Di2/SRAM Force eTap以上の電動コンポ採用率高い"
  wheel_investment: "ホイール投資が顕著。決戦用カーボンディープリム(20-50万円/セット)+トレーニング用アルミ/カーボン+ヒルクライム用軽量ホイールを使い分け。複数セット所有が標準的"
  annual_maintenance_cost: "50万円超/年(消耗品+パーツアップグレード+ホイール・タイヤ+ローラー/スマートトレーナー+レース遠征費+栄養補給+コーチング費)"
  maintenance_practice: "日常〜深いメンテまで自分で実施できる知識・経験。複雑作業(電動コンポ調整、フレーム単位の整備)は信頼する専門ショップに集中して依頼。スマートトレーナー等のインドア機材も整備対象"
  navigation_tool: "Garmin Edge(900/1040系) + Strava有料 + パワーメーター連携 + TrainingPeaks併用(ルート探索より走行ログ解析・トレーニング計画が中心)"
  cycling_culture: "Strava重要視(セグメント/KOM/QOM狙い)、機材沼の住人、レースチーム/レースコミュニティに所属"
  past_destinations: "ヤビツ・赤城山・霧降高原・乗鞍・富士ヒルクライム等のヒルクライム聖地、修善寺CSC・群馬CSC等のレース会場・練習周回コース"
checklist:
  - category: "レース志向特有の悩み・挫折要因"
    rationale: "中級・初心者と異なる「FTP頭打ち」「オーバートレーニング」「家族・仕事との両立」「年齢による衰え」など競技志向特有の課題を抽出"
    queries:
      - "ロードバイク FTP 伸び悩み"
      - "ロードバイク オーバートレーニング"
      - "ロードバイク レース 引退 理由"
  - category: "レース志向のルート設計ニーズ"
    rationale: "練習用インターバルルート、ヒルクライム本番想定の予行演習、テーパリング期の調整ルート等、レース志向特有のルート要件を抽出"
    queries:
      - "ロードバイク インターバル 練習 ルート"
      - "ヒルクライム 試走 ルート"
      - "ロードバイク レース 前 練習"
  - category: "レース志向が既存ツールに感じる限界"
    rationale: "Garmin Edge・Strava・TrainingPeaks等のレース志向向け機能への細かい不満。パワー連携・トレーニング計画連携の要件を抽出"
    queries:
      - "Garmin Connect ルート 物足りない"
      - "TrainingPeaks ルート連携"
      - "Strava ヒルクライム セグメント"
broadlistening_summary:
  - category: "レース志向特有の悩み・挫折要因"
    summary: |
      【FTP伸び悩みの構造的原因】
      「1年以上225WでFTPが頭打ち」(note.com)。原因は「無計画トレーニング」。
      VO2max効果は6〜8週間で飽和、ピリオダイゼーションなしでは頭打ち。
      Red Bull・専門メディア「適切な強度管理欠如、トレーニング計画の体系性不足」。
      「現在ではFTPも上がりづらくなってきた」(note.com 5.5倍達成者でも同様)。

      【オーバートレーニング症候群の現実】
      「元に戻すのに2年かかった」実体験(note.com/moli9ma)。
      ZWIFTワーカー9原因: 兆候無視・急激負荷増加・高強度頻度過多・日常ストレス・
      体質不適合・総量把握不能・リカバリー不足・栄養不足・知識不足。
      「トレーニング>リカバリー」が成立する構造。
      シリアス層の標準パターン(平日インドア高強度+週末150-300km)はこのリスク高い。
      20-30代週3-4日高強度許容、50代週2-3日推奨(年齢差明確)。

      【引退・中断の実態】
      tabirin記事「仕事>家族>年齢」の三重苦が引退要因。
      栗村修コラム(j-sports)「昔みたいに走れないから」の元プロ離れ心理。
      30代以降速筋衰え→スプリント系顕著低下(複数メディア)。
      レース3年以内に20-30%離脱(tabirin調査)。

      【シリアス層特有の葛藤】
      「FTPが下がるのが怖くて休めない」→ 休まないからオーバートレーニング、悪循環。
      レースカテゴリ昇格目標のプレッシャー。
    sources:
      - url: "https://note.com/tatamis_cycle/n/nff5c98aaaac9"
        type: blog
        note: "2年でFTP300W(5.5倍)達成、伸び悩みと解決策の実体験"
