      coverage: high
      confidence: high
      notes: "Audax Japan公式4件・PBP統計2件でprimary 6件(55%)を確保。DNF原因・費用・生活影響の3観点とも具体的数値・エピソード揃い"
  - category: "補給・休憩計画とロングライド向けルート設計"
    summary: |
      【スポーツ栄養学的推奨】
      日本スポーツ栄養学会(JSNA)研究誌2020: 持久性パフォーマンス向上には
      「運動1〜4時間前に体重1kgあたり1〜4gの炭水化物」摂取推奨。
      長時間運動(90分以上)では1時間あたり30〜60g炭水化物補給が国際スタンダード。
      SBAA公式ガイド「1〜1.5時間ごとに何か1つ摂取」「空腹を感じる前に補給」具体目安。

      【道の駅の補給ポイント活用と制約】
      国交省「道の駅登録・案内要綱」: トイレ・駐車場は24時間無料開放が登録要件。
      ただし「地域振興施設(飲食・物販)」は24時間営業義務なし。
      これがブルベ夜間走行での補給困難の根本原因。
      山間部の道の駅では物販・飲食が夕方〜夜間閉店、自販機のみが頼り。
      全国1,231駅(2025年12月時点)登録。

      【RideWithGPSキューシート機能仕様】
      公式ヘルプセンター(support.ridewithgps.com):
      - キューシート自動生成(ターン検知)+手動カスタマイズ可能
      - カスタムキューNotes フィールドは音声ナビ読み上げ
      - PDFキューシートへのズームイン地図埋込み可能
      - Cue Review Tool(交差点ごと確認ワークフロー)はPremium限定
      - FIT/TCXエクスポート時のみコースポイントとしてGarmin転送可(GPX不可)の互換性制約

      【補給計画の戦略性】
      「コンビニ空白地帯では個人商店もマーク」事前マッピング。
      手順: RWGPSコース読込→25kmごとコンビニマーク→PCからの距離計算してマーキング。
      「50〜70kmノンストップでコンビニつなぎ走行」標準パターン。
      補給間隔: 最低30km(1時間)に1度食、20分に1回ボトル。
      走行中: グミ・ラムネ・ミニ羊羹・チョコバーをステムポーチで摂取。

      【ハンガーノック対策】
      1時間おき250kcal摂取推奨。300km以降嘔気対策「1回量少なく回数多め」。
      ゼリー・ジェル・バナナ・岩塩・パン等選択肢の多さが後半補給継続。
      粉飴(マルトデキストリン)は血糖値急変動を避ける。

      【宿泊・仮眠計画】
      - 400km: コンビニ前20分〜1時間仮眠(無料) or ネットカフェ(1,000-3,500円)
      - 600km: ビジネスホテル(7,500-10,000円)6時間滞在(風呂・食事1時間+睡眠4-5時間)
      - 1000km以上: 最低3時間睡眠が「回復」基準
      PCクローズ時間の事前確認必須。

      【夜間走行装備計画】
      ブルベ規定でフロント2灯以上義務。
      「そこそこ明るく長く使える」ランタイム優先、400ルーメン夜の市街地「十分」。
      ハブダイナモ「走行中絶えず発電する有効手段」上級者人気。
      日照長い6月でも「最低9時間持続要」。
