id: persona-endurance
name: ロングライド/ブルベライダー
description: ロード歴5年以上、月800-1500km走るロングライド志向の中年層中心。BRMブルベ完走経験者を中心に、佐渡ロングライド・グランフォンド・Ride Across Japan・自主企画ロングを楽しむ層。レース志向ではなく「走り切る」達成感が動機で、補給・睡眠・夜間走行を含めた行程設計が日常
attributes:
  age_range: "30代-60代以上"
  experience_level: "ロード歴5年以上、ブルベ200-1000km完走経験(SR(Super Randonneur)取得経験者を含む)、佐渡ロングライド・グランフォンド・Ride Across Japan等の長距離イベント参加経験多数"
  typical_scenario: "月1-2回の200km以上ロングライド、平日インドア+週末ロング。夜間走行・雨天走行・寒冷下走行を厭わない"
  monthly_distance: "800-1500km/月"
  motivation:
    - "認定ブルベの完走(BRM 200/300/400/600/1000/1200km)"
    - "SR(Super Randonneur)取得・PBP/LEL等の海外ブルベ参加"
    - "Ride Across Japan等の超ロング自主イベントへの参加"
    - "未踏のロングルート開拓"
    - "ペースを刻んで走り切る達成感、自己との対話"
  bike_type: "エンデュランスロード/ツーリングバイク/ランドナー(レース機材ではなくロング快適性重視)、完成車30-80万円。上級者ほどライド中の自力トラブル対応性を優先し、機械式コンポーネント・チューブドタイヤ(クリンチャー)を選ぶ傾向。電動コンポ(Di2/eTap)・チューブレスは整備性・出先対応の難しさから敬遠する層が一定数存在。フェンダー・ライト・荷台等の長距離装備搭載"
  wheel_investment: "ロングライド快適性重視(乗り心地優先のタイヤ・リム、軽量より耐久性・耐パンク・耐久ベアリング)。ハンドメイド手組ホイールやハブダイナモ装着リムを選ぶ層もいる"
  annual_maintenance_cost: "20-40万円/年(消耗品+ブルベ参加費+宿泊費+補給・装備類+海外ブルベ遠征費)"
  maintenance_practice: "自分でメンテができる(ブルベ中の自己メカニックが必須スキル)。それ以上に、特定ショップでの定期点検を欠かさない傾向が強い(ロングライド前のフレーム・ホイール・コンポ全体チェック、ブルベ前の事前整備が必須)。出先での自力修理が前提の文化"
  supply_planning_practice: "補給(休憩)地点の事前計画が完走の最重要要素。コンビニ間隔・自販機分布・道の駅営業時間・PC(チェックポイント)位置・エスケープ地点・宿泊先(BR)を事前にすべてマッピング。ハンガーノック・水分切れを避ける計画性がDNF回避の鍵"
  navigation_tool: "Garmin Edge(800/1040系) + RideWithGPS有料(ルート設計+キューシート出力重視)、Strava併用、ブルベ用キューシート(PC情報付き)"
  cycling_culture: "日本ランドヌールズ(audaxjapan.org)・各地区ブルベ事務局コミュニティに参加、SR取得者は英雄視される"
  past_destinations: "BRM(各地ブルベ200/300/400/600km)、佐渡ロングライド、グランフォンド糸魚川、Ride Across Japan、PBP・LEL海外大会"
checklist:
  - category: "ブルベ・ロングライド志向特有の悩み・挫折要因"
    rationale: "完走できないDNF原因(睡魔・寒さ・機材トラブル・体力枯渇)、家族の理解、PBP/LEL費用調達等、ロング志向特有の課題を抽出。serious(レース志向)とは異なる"
    queries:
      - "ブルベ DNF 理由"
      - "ロングライド 200km 完走できない"
      - "ブルベ 家族 理解"
  - category: "補給・休憩計画とロングライド向けルート設計"
    rationale: "ロングライド成功の最重要要素は「どこで補給(休憩)するか」の計画性。コンビニ間隔・道の駅営業時間・自販機分布の把握、宿泊地点、夜間照明区間、エスケープルート、PC(チェックポイント)、雨天時迂回など、24時間以上のライド前提の特殊要件を抽出"
    queries:
      - "ブルベ 補給 計画"
      - "ロングライド ハンガーノック 対策"
      - "ブルベ 道の駅 営業時間"
      - "ブルベ 宿泊 計画"
      - "ブルベ 夜間 装備 照明"
  - category: "ロングライド志向が既存ツールに感じる限界"
    rationale: "キューシート連携、バッテリー寿命、オフライン地図、補給ポイント情報の事前マッピング機能等、ロング向けツールへの不満。RideWithGPS・Garmin Edge への要件は他ペルソナと異なる"
    queries:
      - "Garmin Edge バッテリー ブルベ"
      - "RideWithGPS キューシート 連携"
      - "ブルベ GPS ナビ オフライン"
broadlistening_summary:
  - category: "ブルベ・ロングライド志向特有の悩み・挫折要因"
    summary: |
      【公式ルール・認定要件に起因する挫折】
      Audax Japan公式「BRMは無サポート・回収車なし・自己責任」が大原則。
      参加条件「20歳以上で長距離ツーリング経験を持ち自己完結できるサイクリスト+賠償付き保険加入」。
      失格・挫折要因: PC(コントロールポイント)不通過は即失格、キューシートを自力読解する能力前提、
      天候変化・ミスコース・メカトラブル対処を自力で行う必要。
      制限時間「平均時速15km相当」だが、200km/13.5h、300km/20h、400km/27h、600km/40h と長い。

      【SR取得・PBPへの道のりの高さ】
      SR(Super Randonneur)は同一暦年内(1月〜12月)に200/300/400/600km全完走必須。
      AJ公式: PBP参加資格はSR取得が前提。
      PBP 2023(pbpresults.com / cyclecharts.uk): 全66カ国から6,430名出走、
      DNF 80%以上が2日目終了までに発生、フィンランドが完走率首位(気候・経験値の個人差)。

      【DNFの主因】
      - 睡魔・睡眠不足: 600km(制限40時間)で「マイクロスリープ」レベル、100km地点でも強烈な睡魔。15分仮眠で「かなり復活」
      - 体温調節失敗(低体温症・熱中症)
      - 食欲不振・ハンガーノック: 300km以降で嘔気・水しか飲めない事例。PBP2023消費18,500kcal vs 摂取9,500kcal
      - 機材トラブル: グロス速度14km/h以下(制限15km/h)はギリギリ、機材故障重なるとDNF
      - 脚・お尻の痛み: 「膝内側刺すような痛み」「お尻皮膚炎症」
      - メンタル: 「他参加者に置いていかれた」「降雨でモチベーション低下」

      【PBP・海外ブルベ費用負担】
      PBP2023参加総額529,786円(実例)。ANA往復298,620円(2019比+19万)、宿泊58,543円、参加費31,350円。
      装備費(ヘッドライト・テールライト・サドルバッグ)初期投資大。

      【家族・生活への影響】
      600km=1泊2日、1000km=制限75時間(約3泊4日)拘束。
      「リッターバイク2台売っちゃった」「趣味娯楽は全部ヤフオク行き」極端な入れ込み報告。
      年末年始含む全シーズン開催で家族行事と競合。
    sources:
      - url: "https://www.audax-japan.org/brm/brm-entry/"
        type: primary
