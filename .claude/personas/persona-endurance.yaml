  - category: "ロングライド志向が既存ツールに感じる限界"
    summary: |
      【Garmin Edgeのバッテリー問題】
      Edge 1030: 公称20時間、拡張併用で40-44時間。
      Edge 1040 Solar: 公称35時間+ソーラー10時間=45時間、600km(制限40時間)外部充電なし可能。
      ただし「薄曇り山岳ライド4時間でソーラー30分分のみ」実測。
      Edge 1050: 公称20時間/節約60時間、ソーラーなし。
      劣化問題: Edge 530の2.5年使用で「購入直後の6割」。

      BikeForumsランドヌール専門フォーラム:
      - 内蔵充電池では400km以上の走行に対応不能(実走20h前後が限界)
      - 外部バッテリーパック必須だが純正マウントからの脱落リスク
      - eTrex系AA電池モデルは電池交換で長距離対応可だが、
        ルート再計算が敏感すぎて軽微なコース逸脱でも不要な再ルーティング発生
      - Edge 800系は180マイル(約290km)超での記録不具合報告

      【RideWithGPSキューシート連携問題】
      実ブルベ参加者の8割がキューシート印刷版を携帯、GPSナビ単独依存は非現実的。
      キューシート限界「ルートによっては右折・左折のキューが存在しない場合」。

      BikeForumsキューシートスレッド:
      - コントロールポイントを交差点に配置するとキューシート情報が欠落、ボーナスマイル原因
      - 方向案内がT字路以外で不正確、50マイルのライドで5回以上アプリで確認が必要
      - 基盤地図データ(Google Maps)の質がキューシート精度のボトルネック

      【キューシート vs GPSの二重管理問題】
      BikeForumsキューシートスレッド(実ランドヌール多数参加):
      - 「雨でキューシートが劣化し15km迷った」直接体験談
      - 大多数が「紙キューシート+GPSの二重保険」方式採用
      - 完全GPS移行は少数派、経験者ほど紙との併用を推奨
      - GPSは現在地リアルタイム表示・コース逸脱検知が優れているが、
        バッテリー依存と信号なし区間でのナビ精度低下が欠点

      【総合課題】
      補給地点(コンビニ・道の駅)事前マッピングはGarmin・RWGPS標準機能では不十分。
      Strava はブルベのチェックポイント管理・認定記録に非対応。
      複数ツール(Garmin+RWGPS+Googleマップ+紙キューシート)組合せの複雑さが標準運用、一元化への潜在ニーズ高い。
