        type: primary
        note: "TABIRIN公式: レンタサイクル選び方、中間距離需要明示"
      - url: "https://www.softbank.jp/sbnews/entry/20180711_01"
        type: primary
        note: "ソフトバンクニュース: HELLO CYCLING×東京神社巡り、御朱印×シェアサイクル親和性"
      - url: "https://note.com/citose_ark/n/ne1144ac46630"
        type: community
        note: "note: 「ヤマノススメ」聖地2ヶ所自転車巡り体験談(2024年)"
      - url: "https://nishiki-cycling.com/gosyuin-nagareyamashichifukujin/"
        type: blog
        note: "初心者にしきのサイクリングBLOG: 流山七福神御朱印ライド25km"
      - url: "https://www.ringringroad.com/news/3742/"
        type: primary
        note: "つくば霞ヶ浦りんりんロード公式: ツール・ド・御朱印イベント"
      - url: "https://www.wimo.co.jp/blog/bicycle-cafe-love"
        type: blog
        note: "wimo(自転車専門店): カフェ巡り×自転車実践方法"
    self_assessment:
      coverage: high
      confidence: high
      notes: "テーマ起点ルート(御朱印・カフェ・聖地巡礼)実在事例、しまなみ統計一次情報。Drive+レンタサイクル定量データ薄い"
