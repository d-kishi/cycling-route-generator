      - url: "https://detail.chiebukuro.yahoo.co.jp/qa/question_detail/q13181687558"
        type: community
        note: "Yahoo!知恵袋、練習2日目・痣だらけの初心者による具体的な恐怖体験"
      - url: "https://detail.chiebukuro.yahoo.co.jp/qa/question_detail/q13303423328"
        type: community
        note: "Yahoo!知恵袋、25歳女性・クロスバイクで転倒多発の段階からのロード挑戦"
      - url: "https://www.riteway-jp.com/itemblog/topathlete-14065/2017/11/_tada761224"
        type: primary
        note: "ライトウェイ(自転車メーカー公式)、初心者・女性向けの「怖い」解消記事"
      - url: "https://ryusuke-tax.com/2020/11/01/blog-103/"
        type: blog
        note: "購入1ヶ月の初心者ブログ(2020年)。「1人で走行するのって、凄く怖いです」「地名を知らないと迷う」の生の声"
    self_assessment:
      coverage: high
      confidence: high
      notes: "車道恐怖・転倒・一人ライド不安の3軸十分。ループ2でryusuke-tax.com(blog)を追加し情報源多様性向上(primary 2/community 3/blog 1)"
  - category: "ルート選びと情報源の実践"
    summary: |
      【初心者が最初に走る距離と場所の実態】
      専門メディアの調査・記事では初心者の最初の距離目安として「10〜30km」が繰り返し言及される。
      体験談ブログ(milbon24.com)では著者の実体験として「最初の30kmで後半は脚が重くなった」ものの
      「週2回継続で3週間後には50kmへの挑戦を考えるようになった」と記録されており、
      30km→50km→100kmという段階的進行が現実的なパターンとして確認できる。

      【初心者の定番ルート: 河川敷・サイクリングロード一択】
      sbaa-bicycle.com「初心者レベルはおおよそ距離30km以内、サイクリングロードや河川敷など信号や車が少ない安全な場所」。
      荒川CR・多摩川CR・入間川CR等の河川敷CRが「初心者の聖地」として各メディアで推奨。
      「車両止めや、アップダウンがあって、ハンドリングやブレーキ、ギアチェンジのよい練習場所」(sbaa-bicycle.com)。

      【情報源の実態: GoogleマップとStrava無料機能、経験者依存】
      知恵袋(q11289535631)「満足するような物(自動ルート作成アプリ)はまだ無い」。
      Googleマップ「無料だがルート作成で無駄な迂回多い、部分無視判断必要」。
      NAVITIME自転車アプリは有料、初心者には敷居高い。

      【Strava無料版の制約と初心者の本音(SNS的代替)】
      Strava無料版ではGPXエクスポートやコミュニティルート閲覧に制限。
      モノシル掲載のStrava★1レビュー(自転車を始めた初心者の試用後削除)
      「ルートを作成するのがとてもめんどくさく精度もイマイチ。場所を特定するのも困難で、難易度高いです」。
      結果として「経験者に連れていってもらう」「テレビやSNSで見かけた有名なCRに行く」が現実的行動パターン。

      【100km挑戦への情報収集パターン】
      cyclesports.jp等が「補給は30分〜1時間に1回のジェル」「休憩20km間隔」
      「ペースは会話できる程度(最大心拍60%相当)」を提供。

      【ローカル情報依存】
      知恵袋回答者「地元住民の知識や個人の判断が依然必要」。
      アプリでは「危険交差点・走りやすい裏道・補給コンビニ」が得られず経験者同行に依存。
    sources:
      - url: "https://www.sbaa-bicycle.com/article/2098"
        type: primary
        note: "SBAA(スポーツ自転車協会)公式サイト、初心者向けコースの距離目安"
      - url: "https://milbon24.com/beginner-distance/"
        type: blog
        note: "個人体験ブログ(2024年)、30km→50km→100kmの進行実体験"
      - url: "https://detail.chiebukuro.yahoo.co.jp/qa/question_detail/q11289535631"
        type: community
        note: "Yahoo!知恵袋、ルート自動作成アプリの限界とGoogleマップの実態評価"
      - url: "https://www.cyclesports.jp/topics/68335/"
        type: primary
        note: "サイクルスポーツ(専門誌公式)、Strava完全スタートガイド"
      - url: "https://road55.com/100km/"
        type: blog
        note: "個人ブログ、初心者が100km達成するまでの準備・体験談"
      - url: "https://monocil.jp/items/111101/"
        type: sns
        note: "モノシル掲載のStrava口コミ。★1レビュー「ルート作成がとてもめんどくさく精度もイマイチ、難易度高い」(自転車初心者の実声)"
    self_assessment:
      coverage: high
      confidence: high
      notes: "ループ2でmonocil.jpのStrava★1レビュー(sns)を追加し初心者の本音補強(primary 2/community 1/blog 2/sns 1)"
  - category: "ビギナーが感じる「次の一歩」の壁"
    summary: |
      【技術・スキルの壁: 「乗れる」と「乗りこなせる」のギャップ】
      sbaa-bicycle.com/article/2075「乗る」から「乗りこなす」へのステップ:
      ロードバイクは速度2〜3倍・ポジション/変速/ブレーキングが普通の自転車と根本的に異なるため、
      初心者は「走れているが安全に走れていない」状態が続く。
      かつてショップ主催練習会で自然に習得されたスキル(前方確認、ハンドサイン、緊急回避)が、
      ネット完結型ライフでは習得機会がなくなっている。

      【距離拡張の壁: 50km→100kmの心理的・体力的ハードル】
      ameblo.jp/toku-422「100kmが大きな壁」「ハンガーノック恐怖」「パンク等のトラブル対応不能感」。
      milbon24.com「週末ライダーで3ヶ月〜半年で100km完走が現実的」。
      「ただ走るだけ」から「計画して走る(補給戦略・ペース配分・撤退路計画)」への移行が独力では難しい。

      【グループライド・コミュニティ参加の壁】
      akira779.com「主催者への参加表明メール送信に勇気がいる」。
      「主催者・他参加者に迷惑をかけないか」「千切れまいと無理してペースについていく」
      「補給・トイレを我慢してしまう」行動パターン。
      「ゆっくりめのポタペース」と書かれていても数字での速度表示がないと「危険度高い」と参加躊躇。

      女性初心者の実声(知恵袋q12236541242)「速度差が歴然でちぎられ、待たせることが多々ありました」
      という性能コンプレックスがグループライド参加の壁。

      asaren-5am.com「ロードバイクのチームに入る3つのメリット」では参入障壁として
      「ロードバイク乗りには人見知りが多い」「合わない人は確実にいる」
      「チームジャージを着た後に辞められない」という具体的な不安が記述されている。

      仲間探しの困難:購入1ヶ月初心者(ryusuke-tax.com)「税理士会の自転車部を調べたらなかった」
      という具体的な仲間探し失敗例。

      【機材アップグレード(機材沼入口)の壁】
      akira779.com/archives/183「カスタマイズ可能なパーツが多く選択肢広い」戸惑い。
      最初のアップグレード候補=「ホイール」「コンポ(Claris→Tiagra/105)」「タイヤ」。
      「ロードバイク仲間によるホイールアップグレードの熱烈な勧め」が機材沼入口に。

      【継続・挫折の壁: 「3年で8割やめる」業界通説と離脱理由】
      Yahoo!知恵袋q13283118763「3年で8割やめる」業界通説。
      q11254266556「なぜ多くの人がすぐ辞めるか」具体内容:
      ①期待と現実のギャップ「思ったのと違う」(肉体的苦痛、維持コスト)
      ②社会的抵抗感「ピチピチのウェアが恥ずかしい」
      ③環境の欠如「運動不足解消が目的だが、安全に走れる場所が少ない」
      q10172031835「ショップ購入でも3年後の継続は3割以下、通販購入はさらに低い」という業界の感触。
      asaren-5am.com 4大特徴: ①競争心強すぎ ②時間配分困難 ③他者勧めで始めた ④他スポーツ経験者の過剰自己期待。

      【中級層(persona-hobby)との差別化】
      中級層「マンネリ・目的地枯渇・意味付け」とは対照的に、
      初心者は「安全なルート確保」「一人で走りきれるか」「迷わないか」「機材トラブルに自力対応できるか」
      という基礎的な自己効力感の構築が先行課題。
      ビギナーが「次の一歩」として具体的に求めるもの:
      ①グループライドの「怖くない版」(初心者だけで走れる機会、スキル習得の場)
      ②ルートの「お手本」(初心者が走るべき距離・標高を提示するガイド)
      ③一人でも迷わないナビ(孤独感の解消)
