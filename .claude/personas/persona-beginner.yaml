id: persona-beginner
name: ビギナーロードサイクリスト
description: ロード歴1年未満、月100-200km走る入門層。健康維持や趣味づくりが動機で、安全性とシンプルさを最優先。河川敷など車両通行のないルートを好み、経験者同行か自宅周辺の慣れた範囲が中心
attributes:
  age_range: "20代後半-30代後半"
  experience_level: "ロード歴1年未満、独力での長距離は未経験"
  typical_scenario: "土日に30-50km、河川敷・サイクリングロード等の車両通行が少ない安全なルートを優先、経験者同行 or 自宅周辺の慣れたルート"
  monthly_distance: "100-200km/月(weekend warrior)"
  motivation:
    - "健康維持・運動不足解消"
    - "新しい趣味として楽しみたい"
    - "景色を楽しむ・気分転換"
    - "将来的にはもっと長距離を走りたい(成長欲)"
  bike_type: "エントリーロード(完成車価格20-40万円程度、SHIMANO Claris/Sora/Tiagra等の機械式コンポーネント。Di2/eTap等の電動式は採用しない=105未満が目安)"
  annual_maintenance_cost: "5-10万円/年(消耗品+ヘルメット・ウェア・小物中心、本格パーツ交換はまだ行わない)"
  maintenance_practice: "簡単なメンテナンス(空気入れ・洗車・チェーン注油)は自分で行う。ブレーキ/シフトケーブル張替えなど深いメンテナンスは自力で挑戦するか実施しない。特定ショップとの継続的メンテナンス関係は持たない(ショップ常連客ではない)"
  navigation_tool: "Strava無料版 or 未導入、経験者同行に依存、Googleマップ自転車モード"
  cycling_culture: "Strava文化に触れ始めた段階、機材沼にはまだ入っていない、SNSは閲覧中心"
  past_destinations: "近所のサイクリングロード、河川敷、自宅から往復30km圏内"
checklist:
  - category: "ロード初心者の不安と困りごと"
    rationale: "P-VAL(課題仮説)の妥当性検証、安全性・道迷い・体力など中級層と異なる懸念事項の抽出"
    queries:
      - "ロードバイク 初心者 不安"
      - "ロードバイク 一人で走れない"
      - "サイクリング 初心者 道に迷う"
  - category: "ルート選びと情報源の実践"
    rationale: "経験者依存からの独立過程の把握、初心者がアクセスしやすい情報源の抽出"
    queries:
      - "ロードバイク 初心者 ルート おすすめ"
      - "サイクリングコース 初心者向け"
      - "ロードバイク 初めて 100km"
  - category: "ビギナーが感じる「次の一歩」の壁"
    rationale: "距離拡張・装備拡張・コミュニティ参加への障壁を抽出。中級層との差別化軸"
    queries:
      - "ロードバイク 初心者 次のステップ"
      - "ロードバイク 100km 走れない"
      - "ロードバイク 仲間 募集 初心者"
broadlistening_summary:
  - category: "ロード初心者の不安と困りごと"
    summary: |
      【車道走行への恐怖】
      Yahoo!知恵袋質問者「路肩路側帯がない車道や、途中から無くなる車道、車が中央線を超えないと
      回避できない道をロードバイクで走るのが怖い」。bicycle-post.jp も「よく聞く話」と認める。

      【ドロップハンドル・細いタイヤへの適応困難】
      購入直後1ヶ月程度は「ドロップハンドルにも細いタイヤにも慣れていないので怖いと思う」(bicycle-post.jp)。
      知恵袋質問者(25歳女性)「普通の自転車とあまりに違うクイックな動きと、ドロップハンドルが怖く全く乗れず」。

      【転倒・怪我への恐怖とビンディング問題】
      知恵袋質問者(練習2日目)「既に何度も倒れて痣だらけ」「ペダルを漕いでグッと前に出る感覚が怖い」。
      riteway-jp.com「クリートで固定して走るのはかなり難しく、重大な怪我や交通事故のリスクが増加する」。

      【一人ライドへの不安とパンク・メカトラ対応不安】
      bicycle-post.jp「一人だと心が折れてしまう」傾向。経験者同行への依存強い。
      購入1ヶ月の初心者ブログ(ryusuke-tax.com、2020年)「1人で走行するのって、凄く怖いです」
      「地名を知らないと迷う」という当事者の生の声。
      パンク対応への不安が一人ライドの大きな障壁。

      【安全ルート情報の不足】
      bicycle-post.jp「飛び出しの多いところや小学生の登下校に使う道など、あらかじめ知っていれば避けられる危険」。
      知恵袋回答者「命の危険と隣合わせてまで無理に車道を走ることはありません」。

      【中級層(persona-hobby)との差別化】
      中級層「マンネリ・目的地枯渇」と異なり、初心者は「車両との接触事故」「未知の道への不安」
      「メカトラブルへの対応不能感」が主な障壁。
      「怖いのであれば車道を走らない方が安全」という回答が支持を得るのは初心者層特有の現象。
    sources:
      - url: "https://bicycle-post.jp/pwk0000324-post/"
        type: primary
        note: "BICYCLE POST(専門メディア)、初心者の車道走行不安を体系的に解説"
