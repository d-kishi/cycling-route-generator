# --- 仮説の根源(Phase 2全体のアンカー) ---
root:
  type: "課題"
  statement: |
    サイクリストは自分の目的・経験・走行スタイルに合うルートを継続的に得るのが難しい。
    中級層は目的地枯渇、初心者は安全性・道迷い不安、ロング志向は補給計画、
    競技志向は練習ルート設計、カジュアル層はテーマ起点探索など、
    層ごとに異なる困難を抱えるが、それを束ねる手段が存在しない。
    加えて、中級以上の層は「実走時間=移動時間+補給/休憩」を含む所要時間の
    事前見積もりにも共通して失敗しており、ライド体験の社会的コスト
    (家族予定への影響)・本番パフォーマンス(レースペース配分)・
    ライド成立可否(BRM制限時間)が損なわれる。
  rationale: |
    Step A(2026-05-01)で形成した5体ペルソナの broadlistening_summary に
    各層の固有困難が一次情報として記録されている。
    debate-001 の Round 1-3 で各層の困難の差異が一次情報レベルで裏付けられ、
    debate-002(2026-05-04)でグロス速度=中級以上共通の所要時間見積もりギャップ
    として再構成された結果、層別の困難と層横断の困難の二重構造が明確化された。

# --- 仮説キャンバス本体 ---
canvas:

  # ===========================
  # 顧客/ユーザ側
  # ===========================
  customer:

    situation:
      id: C-SIT
      title: "層ごとに異なるルート選択コスト"
      hypothesis: |
        サイクリストは経験レベル・走行スタイル・所属コミュニティに応じて、
        ルート選択に異なる時間コストと認知コストを払っている。
        中級層: 週末ライドのルート選びに30分-1時間
        初心者: 経験者同行 or 慣れた範囲のみ走行可能
        競技層: 練習目的(VO2max/Sweet Spot/インターバル)に応じた区間設計が必要
        カジュアル層: テーマ・目的地を軸に毎回手動探索
        ロング志向: 200km超のPC・補給・宿泊・充電計画が完走条件
      confidence: medium
      evidence:
        - source: "Step A 5体ペルソナ"
          detail: ".claude/personas/persona-*.yaml の attributes と broadlistening_summary に各層の状況が記録"
        - source: "debate-001 Round 1"
          detail: "5体ペルソナが各層固有の状況を裏付けるアイデアを4個ずつ提示"

    overt_problem:
      id: C-OVR
      title: "同じルートの繰り返しに飽きる(中級層)"
      hypothesis: |
        中級ホビー層は気に入ったルートを繰り返し走るうちにマンネリ化し、
        新しいルートの開拓は手動探索に依存しているため、アイデアが枯渇すると行き詰まる。
        飽きの本質は「同じ道を物理的に通る」だけでなく
        「同じ目的・同じテンションで走る」ことにあり、文脈変化(機材試走・カルチャー寄り道)で緩和される。
      confidence: medium
      evidence:
        - source: "PistonHeads UK (2024)"
          detail: "I love exploring but am getting to a point where there's not much I haven't explored locally (Correvor氏)"
        - source: "BikeForums (2019)"
          detail: "the thought of doing the same ride/route takes the joy out of it (mcours2006氏)"
        - source: "PO実体験"
          detail: "週末ライドで感じている目的地枯渇"
        - source: "debate-001 persona-hobby Round 1 アイデア1-4"
          detail: "未踏率・機材沼トリガー・ショップ起点・セグメント密度逆利用の4軸提案"

    overt_problem_safety:
      id: C-OVR-SFT
      title: "安全ルート不安と道迷い恐怖+離脱フォールバックの不在(初心者層)"
      hypothesis: |
        初心者は車道走行・道迷い・パンク等への恐怖から、
        経験者同行か自宅周辺の慣れた範囲しか走行できず、行動範囲が広がらない。
        「安全ルート不安」(事前のルート選定問題)と「道迷い恐怖」(走行中のナビ問題)は分離可能な課題。
        加えて「いつでも輪行で帰れる」という離脱フォールバック計画(輪行可能駅+終電時刻+
        自転車店マーカー等)を心理的安全基地として可視化することで、初心者の遠出心理ハードルが
        構造的に下がる。これは endurance 層の DNF 時輪行帰宅計画(C-OVR-SUP の(7)軸)と
        同一エンジン強度違いで実装可能。
      confidence: medium
      evidence:
        - source: "Yahoo!知恵袋 / ryusuke-tax.com (2020)"
          detail: "1人で走行するのって、凄く怖いです / 地名を知らないと迷う"
        - source: "bicycle-post.jp"
          detail: "一人だと心が折れてしまう傾向、経験者同行への依存強い"
        - source: "debate-001 persona-beginner Round 1 アイデア1-4"
          detail: "卒業ロードマップ処方/車道率ヒートマップ/輪行リカバリー/お手本ルート図鑑の4軸提案"
        - source: "debate-002 D11 beginner-endurance合意"
          detail: "輪行リカバリー(beginner)とDNF時輪行帰宅計画(endurance)は同インフラ(駅DB+終電時刻+自転車店分布)で実装可能と判明"

    overt_problem_supply:
      id: C-OVR-SUP
      title: "制限時間ペナルティ下での7軸統合計画(ロング志向)"
      hypothesis: |
        ロング志向(BRM/PBP/LEL等の認定ブルベ)は、制限時間という外的強制
        (PC不通過=即失格・回収車なし・自己責任)の下で、以下の7軸を
        時系列で統合計画する必要がある:
        (1) PC通過時刻判定: 各PCのオープン/クローズ時刻に対する遅延量を15-25kmごとに動的再計算
        (2) 補給ポイント時系列マッピング: コンビニ間隔/自販機/道の駅営業時間/個人商店の事前マッピング
        (3) 仮眠予算配分: 400km=20分〜1時間 / 600km=4-5h / 1000km=最低3h の距離別予算
        (4) GPS/ライト類のバッテリー予算: Edge内蔵電池の400km限界、外部バッテリー脱落リスク、ハブダイナモ運用
        (5) 雨天時のエスケープルート: 山岳路線封鎖時の代替路、PC到達優先度の動的修正
        (6) 機材トラブル時の対応経路: 自転車店分布、輪行可能駅、ホイール交換可能ショップ
        (7) DNF時の輪行帰宅計画: 各地点から最寄駅までの距離・終電時刻・宿泊先候補
        所要時間見積もり(C-OVR-TIME)は出発時刻/帰宅時刻のラフ予測で完結するが、
        本仮説は「失敗時のペナルティが大きい認定イベント特有の高度行程設計」として
        独立した固有課題である。C-OVR-TIMEとの境界基準は「認定イベントの有無」。
      confidence: medium
      evidence:
        - source: "Audax Japan公式"
          detail: "BRMは無サポート・回収車なし・自己責任。キューシート自力読解前提。「平均時速15km相当」がグロス速度概念の根源"
        - source: "pbpresults.com / cyclecharts.uk"
          detail: "PBP 2023: 全66カ国6,430名出走、DNF 80%以上が2日目までに発生 → 7軸のうち1-2個破綻だけでDNF"
        - source: "BikeForumsランドヌール専門スレッド"
          detail: "内蔵充電池では400km以上の走行に対応不能(実走20h前後が限界)"
        - source: "longride.org"
          detail: "400/600/1000km別仮眠戦略 — 仮眠予算は距離別に大きく異なる固有知識"
        - source: "tourdekimamani.com"
          detail: "Garmin拡張バッテリー300kmブルベインプレ、落下事故リスク報告"
        - source: "cannonball24.com"
          detail: "PBP 2023費用詳細 529,786円 — 制限時間外で水泡に帰す重圧"
        - source: "debate-001 persona-endurance Round 1 アイデア1-4"
          detail: "PC兼補給配置/グロス速度シミュレータ/GPS充電前提/紙キューシートPDFの4軸提案"
        - source: "debate-002 D10 endurance確定提案"
          detail: "7軸統合計画として再定義、C-OVR-TIMEと境界明確化"

    overt_problem_training:
      id: C-OVR-TRN
      title: "練習目的別ルート設計+期分け別有効時間管理の手間(競技志向)"
      hypothesis: |
        競技志向は練習目的(VO2max・FTP・Sweet Spot・スプリント・ヒルクライム試走・チーム練・テーパリング)に応じて
        毎回異なる勾配・距離・路面・信号密度のルート設計が必要だが、
        既存ツールはトレーニング計画(.zwo/構造化ワークアウト)とルートが独立しており連携がない。
        粒度として最低でも「インターバル種別×期分け×集団走行 vs 単独×本番試走 vs 通常練習」の4軸分解が必要。
        加えて期分け別の時間管理指標を切り替える設計が必要:
        - Z2 Base期: 「**有効有酸素時間**」(信号停止・補給での心拍ドロップを除外した中断除外時間)の最大化が目標。
          グロス速度(中断込み)とは符号が逆方向の指標(中断時間を最小化したい)
        - テーパリング期: 「総走行時間上限」管理が目標(過剰走行回避)
        - 本番試走期: 「区間通過タイム精度(±5分)」が目標(C-OVR-TIMEと連動)
      confidence: medium  # debate-002 D3 合意による補強で low → medium 格上げ
      evidence:
        - source: "note.com tatamis_cycle"
          detail: "1年以上225WでFTPが頭打ち / 無計画トレーニング / VO2max効果は6-8週間で飽和"
        - source: "DCRainmaker (2026/2)"
          detail: "TrainingPeaks GPXplore新機能解説と従来のワークフロー摩擦批判"
        - source: "note.com/commutebymybike"
          detail: "富士ヒル試走実例: 平地260W→高地230W実測、260W×0.9=234W予測一致"
        - source: "Strava公式コミュニティ"
          detail: "Strava Fitness vs TrainingPeaks Fitness/Fatigueの大きな乖離 → 中断時間に汚染される指標を一括化する設計の失敗事例"
        - source: "debate-001 persona-serious Round 1 アイデア1-4"
          detail: "ワークアウト連動/ヒルクライム試走モード/チーム練/オーバートレーニング兆候連動の4軸提案"
        - source: "debate-002 D3 serious-endurance合意"
          detail: "Z2 Base練習の本質は『有効有酸素時間』(中断除外)、グロス速度とは符号が逆方向。PBP/BRMでもPM運用者はグロス速度と平均NPを別軸で併用"

    overt_problem_theme:
      id: C-OVR-THM
      title: "テーマ起点での複数スポット連結ルートの不在(カジュアル層)"
      hypothesis: |
        カジュアル層は「お花見ライド」「グルメ巡り」「御朱印」「廃線跡」「酒蔵巡り」など
        テーマ起点でルートを組みたいが、Googleマップ自転車モードでは
        テーマと自転車適性を両立した探索ができず、複数スポットを繋いだ一筆書きルートを
        毎回手動で組み直している。
        飽きの本質はhobby層と異なり、「未テーマ率」(同エリアでも試していないテーマがあるか)が指標となる。
      confidence: low
      evidence:
        - source: "TraveVoice (2026/4)"
          detail: "しまなみ海道2025年度自転車貸出7万9502件・インバウンド70%増 = 観光カジュアル層の市場規模"
        - source: "Toy Bike等のテーマ設定型ライド事例"
          detail: "お花見ライド、グルメライド等のテーマ起点ライド文化が存在"
        - source: "つくば霞ヶ浦りんりんロード公式 / 関東十社"
          detail: "ツール・ド・御朱印 等の自治体・観光協会レベルのコンテンツ化"
        - source: "debate-001 persona-casual Round 1 アイデア1-4"
          detail: "テーマ起点入力/駐輪可否マップ/旅先モード/Stravaなしエクスポートの4軸提案"

    overt_problem_time:
      id: C-OVR-TIME  # debate-002 で新規追加
      title: "所要時間見積もりギャップ(中級以上+関連層)"
      hypothesis: |
        中級以上のサイクリスト(hobby/serious/endurance)は「実走時間=移動時間+補給/立ち寄り」の
        所要時間を事前に見積もろうとするが、既存ツールは平均速度の単純割り算しか提供せず、
        補給・立ち寄り・信号停止・上り下りでの速度変化を含む実態と乖離する。
        加えて時刻起点が両端いずれにも置ける(出発時刻↔到着時刻の双方向逆算+集合時刻起点逆算)
        機能が既存ツールでは不可能で、外部時刻制約への適合計画が手作業で破綻する。

        [統合定義]
        所要時間見積もり = 出発時刻 × 総距離 × 補給/立ち寄り予算で、
        終点時刻 or 区間通過時刻を予測する。同一計算エンジン(BRouter基盤)から派生する
        出力の粒度違いとして、層別運用が成立する。

        [層別運用粒度]
        - hobby: 出発/帰宅時刻 + 立ち寄り時刻ピン、誤差幅±30分
        - serious(本番): 区間通過タイム精度±5分(本番ペース配分、トップチューブ貼付想定)
        - endurance(非ブルベ時): 全行程所要時間の総予測(150km自主ロング等)
          認定ブルベでの制限時間ペナルティ管理は C-OVR-SUP に分離
        - (関連層) casual: 立ち寄り(カフェ・参拝)込みのランチ着・帰宅時刻、逆算モード起点
        - (関連層) beginner成長期: 家族との約束時刻、出発/帰宅時刻のラフ表示

        逆算モード(到着時刻→出発時刻、PC通過時刻→ペース配分、集合時刻→起床時刻)も
        同じエンジンの符号反転で提供する。
        出発時刻・帰宅時刻・補給/立ち寄りタイミング・本番ペース配分・到着時刻逆算の
        見積もりに失敗し、ライド体験の社会的コスト(家族予定への影響)・本番パフォーマンス・
        ライド成立可否(行ける/行けない判断)が損なわれる。
      confidence: low
      evidence:
        - source: "debate-002 D5 統合提案 (debate-001延長)"
          detail: "endurance=行程指標(グロス速度・補給間隔・仮眠予算)と粒度階層化された議論を、中級以上+関連層に層横断化"
        - source: "debate-002 persona-hobby Round 1 意見1"
          detail: "都内発80-120kmで30-90分の帰宅時刻ズレ、家族持ち中級層の継続障壁"
        - source: "debate-002 persona-serious Round 1 意見1"
          detail: "富士ヒル試走『区間通過タイム目標トップチューブ貼付』『平地260W→高地230W実測』"
        - source: "debate-002 persona-casual Round 1 意見1-2"
          detail: "wimo.co.jp『1時間走→コーヒー→30分走→ランチ』典型パターン、知恵袋q10262445820『Googleマップ早すぎる(1.5倍)』、ringringroad.com『ツール・ド・御朱印』"
        - source: "debate-002 persona-beginner Round 1 意見1"
          detail: "Googleマップが30km・1時間40分と出すが実際は倍近く、家族に2時間遅れる経験で河川敷に閉じこもる"
        - source: "debate-002 persona-endurance Round 1 意見1-2"
          detail: "PBP 2023でPC通過予定時刻に対する遅延量を15-25kmごとに再計算、JSNA『30〜60g炭水化物補給』、SBAA『1〜1.5時間ごとに何か1つ摂取』"

    latent_problem:
      id: C-LAT
      title: "層を横断する『自分用ルートの不在』+『所要時間ギャップ』"
      hypothesis: |
        各層に共通する潜在課題は、自分の状況・目的・走行スタイルに合うルートが
        自分用にカスタマイズされた形で得られないこと。
        標準化されたコース集や他人のログを参考にするしかなく、
        『自分のためのルート提案』を受け取る体験が存在しない。
        この欠落は、層ごとに異なる「ルート選択コスト」が共通の構造的根源を持つことを示している。
        加えて、中級以上+関連層には『実走時間=移動時間+補給/立ち寄り』を含む
        所要時間見積もりが既存ツールでは不可能、という共通課題(C-OVR-TIME)が
        重なっており、層を横断する潜在的不満は「ルート選択」と「所要時間管理」の二重構造
        として理解すべきである。
      confidence: medium
      evidence:
        - source: "debate-001 Round 2 全層共通指摘"
          detail: "Strava/RideWithGPS/Komoot/Googleマップ/Garmin/TrainingPeaksは『走った後のログ解析』に強く『これから走る場所の探索・計画』に弱い、という認識を全層が共有"
        - source: "debate-002 Round 2 多層連合"
          detail: "C-OVR-TIME(所要時間見積もりギャップ)が中級以上+関連層共通として4層連合(hobby/casual/beginner/endurance + serious本番ペース配分)で確定"

    alternatives:
      id: C-ALT
      title: "層別に異なる代替ツールの併用と一元化への潜在ニーズ"
      hypothesis: |
        現在は層ごとに異なるツール群を併用している。一元化への潜在ニーズが高いが
        既存ツールはどれも層横断の自動生成を提供していない。
        - hobby層: Strava中心+RideWithGPS/Komoot/Googleマップ併用(年7,800円のコスパ問題)
        - beginner層: Strava無料 or 未導入+Googleマップ+経験者口頭指示
        - serious層: Garmin Edge+Strava有料+TrainingPeaks+Zwift+Intervals.icu
