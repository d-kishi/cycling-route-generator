    type: supports
    note: "endurance のDNF時輪行帰宅計画(C-OVR-SUP 7軸の(7))と beginner の輪行リカバリー(C-OVR-SFT)は同エンジン強度違いで実装可能(離脱フォールバック計画の共通インフラ化)"
  - from: C-OVR-TIME
    to: C-OVR-TRN
    type: supports
    note: "serious の本番ペース配分(区間通過タイム精度±5分)は C-OVR-TIME 内で扱い、Z2 Base練習の有効有酸素時間(中断除外)は C-OVR-TRN 内で扱う"

