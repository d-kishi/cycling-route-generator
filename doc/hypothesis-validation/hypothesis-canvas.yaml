# =============================================================
# 仮説キャンバス: サイクリングルート自動生成サービス
# =============================================================

# --- メタ情報 ---
meta:
  project: "サイクリングルート自動生成サービス"
  version: 1
  updated: "2026-04-09"
  phase: "draft"
  miro_board_url: "https://miro.com/app/board/uXjVGl_jsKI=/"

# --- 仮説の根源（Phase 2全体のアンカー） ---
root:
  type: "課題"
  statement: |
    サイクリストは気に入ったルートを繰り返し走るうちに飽きてくるが、
    新しいルートの開拓はランドマークを起点とした手動探索に依存しており、
    そのネタが尽きると行き詰まる。
    距離・走行時間・方角などの簡単な条件から新しいルート案を自動的に得る手段がない。
  rationale: |
    PO自身の実体験。
    特定ランドマーク（江の島、三笠公園、高尾山口駅等）を目的地とした
    折り返しルートをStravaで管理してきたが、
    目的地となるランドマークのアイデアが枯渇してきており、
    「どこに行ってみたいか」という情報収集のモチベーション自体が低下している。

# --- 仮説キャンバス本体 ---
canvas:

  # ===========================
  # 顧客/ユーザ側
  # ===========================
  customer:

    situation:
      id: C-SIT
      title: "目的地ベースのルート探しに依存"
      hypothesis: |
        東京周辺のスポーツバイク乗り（ロード/クロス/ミニベロ）は、
        走り慣れたルートのレパートリーを持っているが、
        新規ルート開拓は「どこに行くか」の目的地選びに依存しており、
        その情報収集を能動的に行う人は限られている。
      confidence: low
      evidence: []

    overt_problem:
      id: C-OVR
      title: "ルートのマンネリ化と目的地アイデアの枯渇"
      hypothesis: |
        同じルートを繰り返し走ることに飽きを感じているが、
        新しいルートを探す手段が目的地ベースの手動探索しかなく、
        目的地のアイデアが枯渇すると新規ルートの開拓が止まる。
      confidence: medium
      evidence:
        - source: "PO実体験"
          detail: |
            ランドマークの折り返しルートが枯渇、
            情報収集モチベーション低下
        - source: "サイクリング仲間との会話"
          detail: "同様の不満を複数名から聞いている（非公式）"

    latent_problem:
      id: C-LAT
      title: "目的地思考によるルート選択の自由度低下"
      hypothesis: |
        目的地ベースの折り返しルートに依存しているため、
        「目的地に寄らないが走って楽しい道」や
        「条件（距離・標高・方角）に最適化されたルート」という
        選択肢が視野に入っていない。
        ルート選びの自由度が本来より狭まっている可能性がある。
      confidence: low
      evidence:
        - source: "PO実体験"
          detail: |
            適当に作ったルートや無計画に走ったルートが
            非常に楽しかったケースがある

    alternatives:
      id: C-ALT
      title: "手動設計ツールはあるが条件に合った自動生成ができない"
      hypothesis: |
        Stravaのルート作成機能での手動設計、
        RideWithGPS/Garmin Connectでの手動設計、
        サイクリング仲間の口コミやブログ記事、
        Google Mapsでの経路検索（カジュアル層）が代替手段。
        Komoot等に条件入力による自動生成機能は存在するが、
        ユーザのニーズに合った精度での条件指定はできない。
      confidence: medium
      evidence:
        - source: "PO自身の利用経験"
          detail: |
            Stravaの人気セグメントを参考にしているが、
            ルート全体の自動生成はできない
        - source: "debate-001（シリアスライダー指摘）"
          detail: |
            Komootに自動生成機能あり。
            ただし標高分布パターン等の詳細制御は不可。
            詳細は競合調査（GitHub Issue #2）で確認予定

  # ===========================
  # 提供者側
  # ===========================
  provider:

    purpose:
      id: P-PUR
      title: "最小条件入力で新しいルート候補を得る"
      hypothesis: |
        サイクリストが
        「今日はこのくらいの距離・時間で走りたい」と思った時に、
        最小限の条件入力だけで新しいルート候補を手に入れられる状態を作る。
      confidence: medium
      evidence:
        - source: "PO自身のペイン"
          detail: "毎週末のルート選びに感じるフラストレーション"

    vision:
      id: P-VIS
      title: "走る楽しさと新しい道の発見に集中できる世界"
      hypothesis: |
        ルート探しのストレスから解放され、
        サイクリストが「走る楽しさ」と「新しい道・景色の発見」に
        集中できる世界。
        目的地を知らなくても、新しい道との出会いが自然に生まれる。
      confidence: low
      evidence: []

    proposed_value:
      id: P-VAL
      title: "条件入力→複数ルート自動生成→地図比較"
      hypothesis: |
        ルート生成には2つの入力パターンがある:
        1. ゼロからの生成: フリーワードによる自然な条件指定をベースとし、
           距離・走行時間・獲得標高・ルート形態（周回/片道）等の
           詳細パラメータをオプションとして提供。
           任意の位置を出発地点に設定可能。
        2. 既存ルートのバリエーション: GPXインポートした既存ルートの
           区間を指定して部分的に再生成。
        いずれの場合も複数のルート候補を自動生成し、
        地図上で比較・選択できる。
        目的地を自分で探す必要がない。
      confidence: medium
      evidence:
        - source: "既存ツール分析"
          detail: "BRouterの技術的実現可能性を確認済み"
        - source: "debate-001"
          detail: |
            フリーワード+オプションの二層構造、
            周回（往復別ルート含む）/片道の選択、
            既存ルートのバリエーション生成をPO採用

    solution:
      id: P-SOL
      title: "BRouter+Leaflet Webアプリ + ルート調整 + エクスポート"
      hypothesis: |
        Webアプリケーションとして提供。
        BRouterベースのルーティングエンジンで条件に合った
        複数ルートを生成し、Leaflet + OpenStreetMap上に表示。
        生成されたルートは地図上で経由地の追加・削除や
        区間の変更による調整が可能。
        調整後のルートは.tcx/.gpx形式でエクスポートして
        Strava等に取り込める。
      confidence: medium
      evidence:
        - source: "技術調査"
          detail: |
            BRouter + Leaflet + OpenStreetMapの組み合わせで
            技術的に実現可能

    advantage:
      id: P-ADV
      title: "PO=ユーザ + BRouterセルフホストの自由度"
      hypothesis: |
        PO自身がターゲットユーザであり、
        実体験ベースのフィードバックループを高速で回せる。
        BRouterのセルフホストにより、
        サイクリングに特化したルーティングプロファイルを
        自由にカスタマイズできる。
        AGPL-3.0ライセンスによるOSSとしての保護。
      confidence: low
      evidence: []

  # ===========================
  # ビジネス側（未検討）
  # ===========================
  business:
    channel: null
    metrics: null
    revenue: null
    market_size: null

# --- 仮説間のリレーション（仮説の一本線） ---
relations:
  - from: C-SIT
    to: C-OVR
    type: supports
    note: |
      目的地ベースのルート探しに依存している状況が、
      マンネリ化と目的地アイデアの枯渇を生んでいる

  - from: C-OVR
    to: P-PUR
    type: derives
    note: "顕在課題から目的が導出される"

  - from: C-LAT
    to: P-VAL
    type: derives
    note: |
      潜在課題（目的地思考による自由度低下）が、
      条件指定による自動生成の価値を裏付ける

  - from: C-ALT
    to: P-VAL
    type: supports
    note: |
      既存手段では条件に合った精度での自動生成ができないことが、
      提案価値の差別化根拠になる

  - from: P-PUR
    to: P-VIS
    type: derives
    note: "目的の延長線上にビジョンがある"

  - from: P-VAL
    to: P-SOL
    type: derives
    note: "提案価値を実現する具体的手段"

  - from: P-ADV
    to: P-SOL
    type: supports
    note: "優位性がソリューションの実現可能性を支える"
